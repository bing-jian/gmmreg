name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: C++ compile and unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/C++:/workspace/C++" \
            ghcr.io/bing-jian/gmmreg-builder:latest bash -c "
              cmake -B build -S . -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build --parallel \$(nproc) &&
              ctest --test-dir build --output-on-failure"

      # Verify the Python tester image still assembles correctly.
      - name: Build tester image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.tester
          tags: gmmreg-tester:latest
          load: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester
