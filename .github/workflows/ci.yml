name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builder image compiles VXL from source; push to GHCR and cache layers
      # so subsequent runs skip the expensive VXL build.
      - name: Build and push builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.builder
          tags: ghcr.io/bing-jian/gmmreg-builder:latest
          push: true
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      - name: C++ compile and unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/C++:/workspace/C++" \
            ghcr.io/bing-jian/gmmreg-builder:latest bash -c "
              cmake -B build -S . -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build --parallel \$(nproc) &&
              ctest --test-dir build --output-on-failure"

      # Tester image layers Python deps on top of builder; verify it builds.
      - name: Build and push tester image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.tester
          tags: ghcr.io/bing-jian/gmmreg-tester:latest
          push: true
          cache-from: type=gha,scope=tester
          cache-to: type=gha,mode=max,scope=tester
